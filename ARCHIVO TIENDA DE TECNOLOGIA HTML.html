<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Tecnología - Talento Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">TechStore</div>
            <ul class="nav-links">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Productos</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Tienda de Tecnología</h1>
            <p>Innovación y rendimiento en un solo lugar.</p>
        </section>

        <section class="products">
            <div class="product-card">
                <div class="img-placeholder"></div>
                <h3>Laptop Pro 15"</h3>
                <p class="price">$1,200.00</p>
                <button class="btn-buy">Comprar ahora</button>
            </div>
            <div class="product-card">
                <div class="img-placeholder"></div>
                <h3>Smartphone X</h3>
                <p class="price">$899.00</p>
                <button class="btn-buy">Comprar ahora</button>
            </div>
            <div class="product-card">
                <div class="img-placeholder"></div>
                <h3>Audífonos Noise-Cancelling</h3>
                <p class="price">$250.00</p>
                <button class="btn-buy">Comprar ahora</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Proyecto Talento Tech - Tienda de Tecnología</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
